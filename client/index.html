<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        function removeExtensionScripts(node) {
          try {
            if (!node) return
            var scripts = node.querySelectorAll ? node.querySelectorAll('script[src]') : []
            scripts.forEach(function (s) {
              try {
                if (s.src && s.src.indexOf('chrome-extension://') === 0) {
                  s.parentNode && s.parentNode.removeChild(s)
                }
              } catch (err) {}
            })
          } catch (err) {}
        }
        try { removeExtensionScripts(document); } catch (err) {}
        try {
          var mo = new MutationObserver(function (mutations) {
            mutations.forEach(function (m) {
              if (m.addedNodes && m.addedNodes.length) {
                m.addedNodes.forEach(function (n) {
                  try { removeExtensionScripts(n) } catch (err) {}
                })
              }
            })
          })
          mo.observe(document.documentElement || document, { childList: true, subtree: true })
        } catch (err) {}
        try {
          window.addEventListener('error', function (e) {
            if (e && e.filename && e.filename.indexOf('chrome-extension://') === 0) {
              e.preventDefault && e.preventDefault()
              return true
            }
          })
          window.addEventListener('unhandledrejection', function (ev) {
            try {
              var reason = ev && ev.reason
              var stack = (reason && (reason.stack || reason)) || ''
              if (typeof stack === 'string' && stack.indexOf('chrome-extension://') !== -1) {
                ev.preventDefault && ev.preventDefault()
                return true
              }
            } catch (err) {}
          })
        } catch (err) {}
      })()
    </script>
